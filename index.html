<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AURA · Live AR World</title>
<script src="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;
  font-family:'DM Mono',monospace;touch-action:none;user-select:none;-webkit-user-select:none}

/* ── MAP BASE ── */
#map{
  position:fixed;inset:0;z-index:0;
  /* Dark night-mode tint via CSS filter on the MapLibre canvas */
}
/* Darken map canvas to night-mode look */
#map canvas{
  filter:brightness(0.35) saturate(0.6) hue-rotate(190deg);
}

/* ── LENS / OPTICS OVERLAY ── */
#lens{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 120% 80% at 50% 50%,
      transparent 40%,
      rgba(0,0,0,0.45) 100%),
    linear-gradient(180deg,rgba(0,10,30,0.15) 0%,transparent 30%,transparent 70%,rgba(0,5,20,0.25) 100%);
}
/* Subtle scanlines */
#lens::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,
    transparent,transparent 3px,
    rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);
}
/* Moving scan line */
#lens::after{
  content:'';position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,
    transparent 0%,rgba(0,255,209,0.4) 30%,
    rgba(0,255,209,0.75) 50%,rgba(0,255,209,0.4) 70%,transparent 100%);
  animation:scanmove 10s linear infinite;opacity:0.3;
}
@keyframes scanmove{0%{top:-2px}100%{top:100vh}}

/* ── HUD LAYER ── */
#hud{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}

/* CORNER BRACKETS */
.brk{position:absolute;width:50px;height:50px}
.brk svg{width:100%;height:100%}
.tl{top:12px;left:12px}
.tr{top:12px;right:12px;transform:scaleX(-1)}
.bl{bottom:12px;left:12px;transform:scaleY(-1)}
.br{bottom:12px;right:12px;transform:scale(-1,-1)}

/* WORLD NAMEPLATE */
#nameplate{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  background:rgba(0,3,12,0.78);
  border:1px solid rgba(0,255,209,0.14);border-top:none;
  border-radius:0 0 10px 10px;
  padding:8px 24px 10px;backdrop-filter:blur(20px);
  text-align:center;pointer-events:none;
}
.np-name{
  font-family:'Orbitron',monospace;font-size:10px;font-weight:700;
  letter-spacing:.22em;color:rgba(255,255,255,0.88);
}
.np-sub{
  font-size:8px;letter-spacing:.13em;color:rgba(0,255,209,0.45);
  margin-top:2px;display:flex;align-items:center;justify-content:center;gap:5px;
}
.lpip{
  width:5px;height:5px;border-radius:50%;background:#FF4040;
  box-shadow:0 0 6px #FF4040;animation:pip 1s ease infinite;flex-shrink:0;
}
@keyframes pip{0%,100%{opacity:1}50%{opacity:.15}}

/* COMPASS STRIP */
#cw{
  position:absolute;top:60px;left:50%;transform:translateX(-50%);
  width:min(360px,84vw);overflow:hidden;pointer-events:none;
}
#ci{
  display:flex;align-items:center;padding:5px 0;
  background:rgba(0,3,12,0.65);border:1px solid rgba(255,255,255,0.07);
  border-radius:7px;backdrop-filter:blur(14px);position:relative;
}
#cs{display:flex;align-items:center;white-space:nowrap;will-change:transform}
.ct{font-size:8px;letter-spacing:.04em;padding:0 7px;color:rgba(255,255,255,0.13);flex-shrink:0}
.ct.mj{color:rgba(0,255,209,0.42);font-size:9px}
.ct.hi{color:#00FFD1;font-weight:500;font-size:10px}
.caret{
  position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;
  border-bottom:5px solid #00FFD1;filter:drop-shadow(0 0 4px #00FFD1);
}

/* CORNER STATS */
.cst{position:absolute;top:18px;display:flex;flex-direction:column;gap:2px}
.cst.L{left:72px}.cst.R{right:72px;align-items:flex-end}
.cl{font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,255,209,0.3)}
.cv{
  font-family:'Orbitron',monospace;font-size:11px;font-weight:500;
  color:#00FFD1;text-shadow:0 0 14px rgba(0,255,209,0.45);letter-spacing:.05em;
}
.cv.warn{color:#FF9030;text-shadow:0 0 14px rgba(255,144,48,0.45)}

/* CENTER RETICLE */
#ret{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);pointer-events:none;
}
.ri{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);border-radius:50%;
}
.r1{width:50px;height:50px;border:1px solid rgba(0,255,209,0.14);
  animation:rspin 12s linear infinite}
.r2{width:26px;height:26px;border:1px solid rgba(0,255,209,0.22)}
@keyframes rspin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.rdot{
  width:4px;height:4px;border-radius:50%;background:#00FFD1;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  box-shadow:0 0 12px #00FFD1;animation:rpulse 2s ease infinite;
}
@keyframes rpulse{0%,100%{box-shadow:0 0 8px #00FFD1}50%{box-shadow:0 0 22px #00FFD1,0 0 44px rgba(0,255,209,0.22)}}
.rtick{position:absolute;background:rgba(0,255,209,0.38)}
.rt-h{height:1px;width:9px;top:50%;left:-13px;transform:translateY(-50%)}
.rt-h2{height:1px;width:9px;top:50%;right:-13px;transform:translateY(-50%)}
.rt-v{width:1px;height:9px;left:50%;top:-13px;transform:translateX(-50%)}
.rt-v2{width:1px;height:9px;left:50%;bottom:-13px;transform:translateX(-50%)}

/* ── AR ANCHOR NODES ── */
.anc{
  position:absolute;transform:translate(-50%,-50%);
  pointer-events:all;cursor:pointer;
  opacity:0;transition:opacity .45s ease;will-change:opacity,transform;
}
.anc.vis{opacity:1}

.adot{
  width:13px;height:13px;border-radius:50%;
  border:1.5px solid #00FFD1;background:rgba(0,255,209,0.1);
  box-shadow:0 0 18px rgba(0,255,209,0.38);
  margin:0 auto;position:relative;z-index:2;
  animation:adp 2.5s ease-in-out infinite;transition:all .2s;
}
.anc:hover .adot{
  transform:scale(1.4);background:rgba(0,255,209,0.24);
  box-shadow:0 0 30px rgba(0,255,209,0.65);
}
@keyframes adp{
  0%,100%{box-shadow:0 0 14px rgba(0,255,209,0.38)}
  50%{box-shadow:0 0 28px rgba(0,255,209,0.65),0 0 50px rgba(0,255,209,0.15)}
}

.astem{
  width:1px;background:linear-gradient(to top,rgba(0,255,209,0.52),transparent);
  margin:0 auto;opacity:.45;animation:sp 3s ease-in-out infinite;
}
@keyframes sp{0%,100%{opacity:.35}50%{opacity:.65}}

.acard{
  background:rgba(0,3,14,0.84);
  border:1px solid rgba(0,255,209,0.24);
  border-radius:9px;padding:10px 13px;
  position:relative;overflow:hidden;
  backdrop-filter:blur(24px);
  box-shadow:0 2px 30px rgba(0,0,0,0.58),inset 0 1px 0 rgba(0,255,209,0.07);
  min-width:var(--w,145px);
  transition:border-color .2s,box-shadow .2s;
}
.anc:hover .acard{
  border-color:rgba(0,255,209,0.52);
  box-shadow:0 4px 50px rgba(0,0,0,0.72),0 0 30px rgba(0,255,209,0.1);
}
/* Corner marks */
.acard::before{
  content:'';position:absolute;top:4px;left:4px;
  width:7px;height:7px;
  border-top:1px solid rgba(0,255,209,0.5);
  border-left:1px solid rgba(0,255,209,0.5);
}
.acbr{
  position:absolute;bottom:4px;right:4px;
  width:7px;height:7px;
  border-bottom:1px solid rgba(0,255,209,0.5);
  border-right:1px solid rgba(0,255,209,0.5);
}
/* Shimmer */
.acard::after{
  content:'';position:absolute;top:0;left:-70%;
  width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.03),transparent);
  transform:skewX(-15deg);
  animation:shimmer 9s ease-in-out infinite;
  animation-delay:var(--sh,0s);
}
@keyframes shimmer{0%,60%,100%{left:-70%}38%{left:130%}}

.atype{
  font-size:7px;letter-spacing:.17em;text-transform:uppercase;
  color:rgba(0,255,209,0.44);margin-bottom:5px;
  display:flex;align-items:center;gap:4px;
}
.atd{width:3px;height:3px;border-radius:50%;background:#00FFD1;
  box-shadow:0 0 5px #00FFD1;animation:pip 2s ease infinite}
.atitle{
  font-family:'Orbitron',monospace;font-size:10px;font-weight:700;
  letter-spacing:.02em;color:rgba(255,255,255,0.92);
  line-height:1.3;margin-bottom:3px;
}
.aval{
  font-family:'Orbitron',monospace;font-size:13px;font-weight:700;
  color:#00FFD1;text-shadow:0 0 10px rgba(0,255,209,0.4);
  line-height:1.2;
}
.asub{font-size:8px;color:rgba(255,255,255,0.25);margin-top:2px}
.adist{
  position:absolute;top:7px;right:10px;
  font-size:7px;color:rgba(0,255,209,0.32);letter-spacing:.06em;
}

/* VARIANT COLORS */
.vr .adot{border-color:#FF4040;background:rgba(255,64,64,0.08);box-shadow:0 0 16px rgba(255,64,64,0.35)}
.vr .astem{background:linear-gradient(to top,rgba(255,64,64,0.5),transparent)}
.vr .acard{border-color:rgba(255,64,64,0.22)}
.vr .acard::before,.vr .acbr{border-color:rgba(255,64,64,0.45)}
.vr .atype,.vr .aval{color:#FF4040}.vr .atd{background:#FF4040;box-shadow:0 0 5px #FF4040}
.vr:hover .acard{border-color:rgba(255,64,64,0.55)}

.vo .adot{border-color:#FF9030;background:rgba(255,144,48,0.08);box-shadow:0 0 16px rgba(255,144,48,0.35)}
.vo .astem{background:linear-gradient(to top,rgba(255,144,48,0.5),transparent)}
.vo .acard{border-color:rgba(255,144,48,0.22)}
.vo .acard::before,.vo .acbr{border-color:rgba(255,144,48,0.45)}
.vo .atype,.vo .aval{color:#FF9030}.vo .atd{background:#FF9030;box-shadow:0 0 5px #FF9030}

.vy .adot{border-color:#FFD700;background:rgba(255,215,0,0.07);box-shadow:0 0 16px rgba(255,215,0,0.3)}
.vy .astem{background:linear-gradient(to top,rgba(255,215,0,0.45),transparent)}
.vy .acard{border-color:rgba(255,215,0,0.2)}
.vy .acard::before,.vy .acbr{border-color:rgba(255,215,0,0.38)}
.vy .atype,.vy .aval{color:#FFD700}.vy .atd{background:#FFD700;box-shadow:0 0 5px #FFD700}

/* ── POPUP ── */
#popup{
  position:fixed;bottom:88px;left:50%;
  transform:translateX(-50%) translateY(16px);
  width:min(340px,90vw);
  background:rgba(0,3,14,0.94);
  border:1px solid rgba(0,255,209,0.28);
  border-radius:14px;backdrop-filter:blur(30px);
  z-index:10;opacity:0;pointer-events:none;
  transition:all .32s cubic-bezier(.34,1.1,.64,1);
  box-shadow:0 16px 60px rgba(0,0,0,0.82),0 0 40px rgba(0,255,209,0.05);
}
#popup.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}
.ph{
  padding:15px 17px 12px;border-bottom:1px solid rgba(0,255,209,0.07);
  display:flex;align-items:flex-start;gap:11px;
}
.pico{
  width:38px;height:38px;border-radius:10px;
  border:1px solid rgba(0,255,209,0.18);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;background:rgba(0,255,209,0.04);
}
.pmet{flex:1}
.ptyp{font-size:7px;letter-spacing:.17em;text-transform:uppercase;color:rgba(0,255,209,0.44);margin-bottom:3px}
.ptit{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:rgba(255,255,255,0.9);letter-spacing:.01em}
.pclose{
  width:30px;height:30px;border-radius:7px;
  background:rgba(255,255,255,0.04);border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:rgba(255,255,255,0.3);cursor:pointer;transition:all .2s;flex-shrink:0;
}
.pclose:hover{background:rgba(255,64,64,0.12);color:#FF4040}
.pb{padding:14px 17px 17px;display:flex;flex-direction:column;gap:11px}
.psg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pstat{
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
  border-radius:9px;padding:11px 9px;text-align:center;
}
.psv{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:#00FFD1}
.psl{font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.22);margin-top:3px}
.pdesc{font-size:10px;color:rgba(255,255,255,0.36);line-height:1.8}
.pacts{display:flex;gap:8px}
.pact{
  flex:1;padding:11px;border-radius:9px;
  font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:.1em;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;
}
.pa{background:rgba(0,255,209,0.07);border:1px solid rgba(0,255,209,0.27);color:#00FFD1}
.pa:hover{background:rgba(0,255,209,0.14);box-shadow:0 0 20px rgba(0,255,209,0.14)}
.ps2{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.36)}
.ps2:hover{color:rgba(255,255,255,0.75);border-color:rgba(255,255,255,0.22)}

/* ── RADAR ── */
#radar{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  pointer-events:none;z-index:3;
  background:rgba(0,3,12,0.78);border:1px solid rgba(0,255,209,0.18);
  border-radius:50%;
}

/* BOTTOM STATS */
.bst{position:fixed;z-index:3;pointer-events:none;bottom:18px}
.bst.L{left:68px}.bst.R{right:68px;text-align:right}
.bv{
  font-family:'Orbitron',monospace;font-size:10px;font-weight:500;
  color:#00FFD1;text-shadow:0 0 10px rgba(0,255,209,0.4);letter-spacing:.05em;
}
.bl2{font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:rgba(0,255,209,0.28);margin-top:2px}

/* WEATHER STRIP */
#weather-strip{
  position:fixed;top:0;right:0;
  background:rgba(0,3,12,0.72);border-left:1px solid rgba(0,255,209,0.12);
  border-bottom:1px solid rgba(0,255,209,0.12);border-radius:0 0 0 10px;
  padding:8px 14px;backdrop-filter:blur(16px);
  pointer-events:none;z-index:3;text-align:right;
}
.ws-temp{
  font-family:'Orbitron',monospace;font-size:16px;font-weight:700;
  color:#00FFD1;text-shadow:0 0 14px rgba(0,255,209,0.4);letter-spacing:.04em;
}
.ws-desc{font-size:8px;letter-spacing:.1em;color:rgba(255,255,255,0.35);margin-top:2px}
.ws-detail{font-size:7px;letter-spacing:.08em;color:rgba(0,255,209,0.3);margin-top:1px}

/* TOAST */
#toast{
  position:fixed;top:76px;left:50%;transform:translateX(-50%) translateY(-10px);
  background:rgba(0,3,14,0.92);border:1px solid rgba(0,255,209,0.26);
  border-radius:10px;padding:9px 18px;
  font-size:11px;color:rgba(0,255,209,0.8);letter-spacing:.08em;
  backdrop-filter:blur(18px);z-index:30;opacity:0;pointer-events:none;
  transition:all .3s ease;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* FLASH */
#flash{
  position:fixed;inset:0;pointer-events:none;z-index:20;
  border:1.5px solid transparent;opacity:0;transition:opacity .1s;border-radius:3px;
}
#flash.on{border-color:rgba(0,255,209,0.55);box-shadow:inset 0 0 80px rgba(0,255,209,0.04);opacity:1}

/* BOOT */
#boot{
  position:fixed;inset:0;z-index:100;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:13px;padding:40px;
}
.blogo{
  font-family:'Orbitron',monospace;font-size:38px;font-weight:900;letter-spacing:.16em;
  color:#00FFD1;text-shadow:0 0 44px rgba(0,255,209,0.35);margin-bottom:6px;
}
.bsub{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:rgba(0,255,209,0.32);margin-bottom:28px}
.bsteps{display:flex;flex-direction:column;gap:11px;min-width:280px;margin-bottom:16px}
.bstep{
  display:flex;align-items:center;gap:11px;
  font-size:10px;letter-spacing:.08em;color:rgba(255,255,255,0.18);
  transition:color .4s;
}
.bstep.ok{color:#00FFD1}.bstep.err{color:rgba(255,64,64,0.65)}.bstep.run{color:rgba(255,255,255,0.45)}
.bdot{width:6px;height:6px;border-radius:50%;border:1px solid currentColor;flex-shrink:0;transition:background .3s}
.bstep.ok .bdot,.bstep.err .bdot{background:currentColor}
.bbar{width:280px;height:2px;background:rgba(255,255,255,0.05);border-radius:999px;overflow:hidden}
.bfill{height:100%;background:linear-gradient(90deg,#7C5CFC,#00FFD1);width:0%;transition:width .4s ease;border-radius:999px}

/* MapLibre UI overrides */
.maplibregl-ctrl-bottom-left,.maplibregl-ctrl-bottom-right,
.maplibregl-ctrl-top-left,.maplibregl-ctrl-top-right{display:none!important}

/* DRAG HINT */
#hint{
  position:fixed;top:50%;left:50%;transform:translate(-50%,55px);
  font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(0,255,209,0.2);pointer-events:none;z-index:3;
  animation:hintfade 5s ease 2s forwards;
}
@keyframes hintfade{0%{opacity:1}100%{opacity:0}}

/* AUDIO VIZ */
#audio-viz{
  position:fixed;bottom:0;left:0;right:0;height:40px;
  pointer-events:none;z-index:3;
  display:flex;align-items:flex-end;justify-content:center;gap:2px;
  padding:0 20px 8px;opacity:0;transition:opacity .5s;
}
#audio-viz.on{opacity:1}
.av-bar{
  width:3px;border-radius:2px 2px 0 0;
  background:rgba(0,255,209,0.5);
  animation:avbar var(--d,.5s) ease-in-out infinite alternate;
  animation-delay:var(--dl,0s);
}
@keyframes avbar{0%{height:3px}100%{height:var(--h,20px)}}
</style>
</head>
<body>

<!-- MAP -->
<div id="map"></div>

<!-- LENS FX -->
<div id="lens"></div>

<!-- HUD LAYER -->
<div id="hud">

  <!-- CORNER BRACKETS -->
  <div class="brk tl"><svg viewBox="0 0 50 50" fill="none">
    <path d="M2 20L2 2L20 2" stroke="rgba(0,255,209,0.55)" stroke-width="1.5"/>
    <path d="M2 8L2 2L8 2" stroke="rgba(0,255,209,0.92)" stroke-width="1"/>
  </svg></div>
  <div class="brk tr"><svg viewBox="0 0 50 50" fill="none">
    <path d="M2 20L2 2L20 2" stroke="rgba(0,255,209,0.55)" stroke-width="1.5"/>
    <path d="M2 8L2 2L8 2" stroke="rgba(0,255,209,0.92)" stroke-width="1"/>
  </svg></div>
  <div class="brk bl"><svg viewBox="0 0 50 50" fill="none">
    <path d="M2 20L2 2L20 2" stroke="rgba(0,255,209,0.55)" stroke-width="1.5"/>
    <path d="M2 8L2 2L8 2" stroke="rgba(0,255,209,0.92)" stroke-width="1"/>
  </svg></div>
  <div class="brk br"><svg viewBox="0 0 50 50" fill="none">
    <path d="M2 20L2 2L20 2" stroke="rgba(0,255,209,0.55)" stroke-width="1.5"/>
    <path d="M2 8L2 2L8 2" stroke="rgba(0,255,209,0.92)" stroke-width="1"/>
  </svg></div>

  <!-- WORLD NAMEPLATE -->
  <div id="nameplate">
    <div class="np-name" id="np-name">ACQUIRING GPS…</div>
    <div class="np-sub"><span class="lpip"></span><span id="np-sub">LIVE AR LAYER</span></div>
  </div>

  <!-- COMPASS -->
  <div id="cw"><div id="ci"><div id="cs"></div><div class="caret"></div></div></div>

  <!-- CORNER STATS -->
  <div class="cst L">
    <div class="cl">Heading</div>
    <div class="cv" id="v-hdg">---°</div>
  </div>
  <div class="cst R">
    <div class="cl">Nearby</div>

<script>
'use strict';

// ════════════════════════════════════════════
// CONSTANTS & STATE
// ════════════════════════════════════════════
const FOV_H = 72, FOV_V = 52;
const SMOOTH = 0.1, MAP_SMOOTH = 0.08;

let map = null;
let userLat = 40.7580, userLon = -73.9855; // Times Square fallback
let heading = 0, smoothH = 0;
let pitch = 0, smoothP = 0;
let hasSensor = false;
let frame = 0, t = 0;
let weatherData = {};
let places = [];
let audioCtx = null, audioEnabled = false;

// ════════════════════════════════════════════
// BOOT SEQUENCE
// ════════════════════════════════════════════
const setStep = (id, state, text) => {
  const el = document.getElementById(id);
  el.className = 'bstep ' + state;
  if (text) el.querySelector('.bdot').nextSibling.textContent = ' ' + text;
};
const setProgress = p => { document.getElementById('bfill').style.width = p + '%'; };
const delay = ms => new Promise(r => setTimeout(r, ms));

async function boot() {
  // S1: GPS
  setStep('s1','run');
  try {
    const pos = await getGPS();
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    setStep('s1','ok',`${userLat.toFixed(4)}, ${userLon.toFixed(4)}`);
  } catch(e) {
    setStep('s1','err','GPS denied — using Times Square, NYC');
  }
  setProgress(18);

  // S2: Map
  setStep('s2','run');
  await initMap();
  setStep('s2','ok','3D buildings loaded');
  setProgress(38);

  // S3: Weather
  setStep('s3','run');
  try {
    weatherData = await fetchWeather(userLat, userLon);
    setStep('s3','ok',`${weatherData.tempFStr} · ${weatherData.desc}`);
    updateWeatherUI();
  } catch(e) {
    setStep('s3','err','Weather unavailable');
  }
  setProgress(58);

  // S4: Places
  setStep('s4','run');
  try {
    places = await fetchPlaces(userLat, userLon);
    if (!places.length) throw new Error('no results');
    setStep('s4','ok',`${places.length} anchors found`);
  } catch(e) {
    places = getMockPlaces();
    setStep('s4','err',`Using ${places.length} demo anchors`);
  }
  setProgress(78);
  buildAnchors();

  // S5: Sensors
  setStep('s5','run');
  initSensors();
  await delay(500);
  setStep('s5', 'ok', hasSensor ? 'Gyroscope active' : 'Drag-to-look mode');
  setProgress(100);

  await delay(800);
  const boot = document.getElementById('boot');
  boot.style.transition = 'opacity .8s ease';
  boot.style.opacity = '0';
  setTimeout(() => {
    boot.style.display = 'none';
    startLoop();
    buildAudioViz();
    // Start GPS watch
    if (navigator.geolocation) {
      navigator.geolocation.watchPosition(pos => {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
        if (map) map.setCenter([userLon, userLat]);
      }, null, { enableHighAccuracy: true, maximumAge: 3000 });
    }
    // Fetch location name
    fetchLocationName(userLat, userLon);
    showToast('⬡ AR Layer Active · ' + places.length + ' anchors in range');
  }, 800);
}

function getGPS() {
  return new Promise((res, rej) => {
    if (!navigator.geolocation) return rej(new Error('no geo'));
    navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 10000 });
  });
}

// ════════════════════════════════════════════
// MAP — MapLibre GL JS + OpenFreeMap tiles
// ════════════════════════════════════════════
function initMap() {
  return new Promise(resolve => {
    map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/dark',
      center: [userLon, userLat],
      zoom: 18,
      pitch: 55,
      bearing: 0,
      antialias: true,
      attributionControl: false,
      interactive: false // We control camera via sensors/drag
    });

    map.on('load', () => {
      // Add 3D buildings with AR-tinted color
      try {
        const layers = map.getStyle().layers;
        let labelLayerId;
        for (const layer of layers) {
          if (layer.type === 'symbol' && layer.layout && layer.layout['text-field']) {
            labelLayerId = layer.id;
            break;
          }
        }
        // Remove existing building layer if present, add our styled one
        if (map.getLayer('building')) map.removeLayer('building');
        if (map.getSource('openmaptiles') || map.getSource('openfreemap')) {
          const srcId = map.getSource('openfreemap') ? 'openfreemap' : 'openmaptiles';
          map.addLayer({
            'id': '3d-buildings-ar',
            'source': srcId,
            'source-layer': 'building',
            'type': 'fill-extrusion',
            'minzoom': 14,
            'filter': ['!=', ['get', 'hide_3d'], true],
            'paint': {
              'fill-extrusion-color': [
                'interpolate', ['linear'], ['get', 'render_height'],
                0,   '#0a1628',
                50,  '#0d1e38',
                100, '#101f3a',
                200, '#0e1c36',
                400, '#0c1830'
              ],
              'fill-extrusion-height': [
                'interpolate', ['linear'], ['zoom'],
                14, 0,
                15, ['get', 'render_height']
              ],
              'fill-extrusion-base': [
                'case', ['>=', ['get', 'zoom'], 15],
                ['get', 'render_min_height'], 0
              ],
              'fill-extrusion-opacity': 0.9
            }
          }, labelLayerId);
        }
      } catch(e) {
        console.warn('3D buildings layer:', e.message);
      }
      resolve();
    });

    map.on('error', () => resolve()); // Don't block boot on tile errors
  });
}

// ════════════════════════════════════════════
// WEATHER — Open-Meteo
// ════════════════════════════════════════════
async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?` +
    `latitude=${lat}&longitude=${lon}` +
    `&current=temperature_2m,relative_humidity_2m,apparent_temperature,` +
    `weather_code,wind_speed_10m,wind_direction_10m,precipitation,visibility` +
    `&temperature_unit=celsius&wind_speed_unit=mph&timezone=auto`;
  const r = await fetch(url);
  const d = await r.json();
  const c = d.current;
  const tempF = Math.round(c.temperature_2m * 9/5 + 32);
  const feelsF = Math.round(c.apparent_temperature * 9/5 + 32);
  const desc = wmoDesc(c.weather_code);
  const windDir = degCompass(c.wind_direction_10m || 0);
  const vis = c.visibility ? (c.visibility >= 1000 ? (c.visibility/1000).toFixed(1)+'km' : c.visibility+'m') : '—';
  return {
    tempF, feelsF, tempFStr: tempF+'°F', desc,
    humidity: c.relative_humidity_2m,
    wind: Math.round(c.wind_speed_10m), windDir,
    precip: c.precipitation, vis,
    icon: wmoIcon(c.weather_code)
  };
}

const WMO_DESC = {
  0:'Clear Sky',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',
  45:'Foggy',48:'Icy Fog',51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',
  61:'Light Rain',63:'Rain',65:'Heavy Rain',71:'Light Snow',73:'Snow',75:'Heavy Snow',
  80:'Rain Showers',81:'Showers',82:'Heavy Showers',95:'Thunderstorm',99:'Severe Storm'
};
const wmoDesc = c => WMO_DESC[c] || `Code ${c}`;
const WMO_ICON = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌧️',55:'🌧️',
  61:'🌧️',63:'🌧️',65:'🌊',71:'❄️',73:'❄️',75:'🌨️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',99:'🌩️'};
const wmoIcon = c => WMO_ICON[c] || '🌡️';
const degCompass = d => ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];

function updateWeatherUI() {
  if (!weatherData.tempFStr) return;
  document.getElementById('ws-temp').textContent = weatherData.icon + ' ' + weatherData.tempFStr;
  document.getElementById('ws-desc').textContent = weatherData.desc;
  document.getElementById('ws-detail').textContent =
    `Feels ${weatherData.feelsF}°F · Wind ${weatherData.wind}mph ${weatherData.windDir} · Humidity ${weatherData.humidity}%`;
  document.getElementById('weather-strip').style.display = 'block';
}

// ════════════════════════════════════════════
// PLACES — Overpass / OSM
// ════════════════════════════════════════════
async function fetchPlaces(lat, lon) {
  const R = 250;
  const q = `[out:json][timeout:12];
(
  node[amenity~"restaurant|cafe|bar|bank|pharmacy|hospital|cinema|hotel|fast_food|fuel|supermarket|parking|pub|library|theatre|nightclub"](around:${R},${lat},${lon});
  node[shop~"convenience|clothes|electronics|bakery|bookshop|sports|beauty|hairdresser"](around:${R},${lat},${lon});
  node[tourism~"attraction|museum|viewpoint|artwork|gallery"](around:${R},${lat},${lon});
  node[leisure~"park|fitness_centre|sports_centre"](around:${R},${lat},${lon});
  node[historic~"monument|memorial|castle|ruins"](around:${R},${lat},${lon});
)->.r;
.r out body;`;

  const resp = await fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'data=' + encodeURIComponent(q)
  });
  const data = await resp.json();
  return (data.elements || [])
    .filter(e => e.tags && (e.tags.name))
    .slice(0, 14)
    .map(e => {
      const type = e.tags.amenity || e.tags.shop || e.tags.tourism || e.tags.leisure || e.tags.historic || 'place';
      const { ico, cls, cat } = classifyPlace(type, e.tags);
      const dist = haversine(lat, lon, e.lat, e.lon);
      const bear = bearing(lat, lon, e.lat, e.lon);
      return {
        id: 'osm_' + e.id,
        name: e.tags.name,
        type, ico, cls, cat,
        lat: e.lat, lon: e.lon,
        dist, bearing: bear,
        elev: 4 + Math.random() * 14,
        tags: e.tags
      };
    });
}

// ════════════════════════════════════════════
// GEO MATH
// ════════════════════════════════════════════
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,r=Math.PI/180;
  const dLat=(lat2-lat1)*r,dLon=(lon2-lon1)*r;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLon/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
function bearing(lat1,lon1,lat2,lon2){
  const r=Math.PI/180,dLon=(lon2-lon1)*r;
  const y=Math.sin(dLon)*Math.cos(lat2*r);
  const x=Math.cos(lat1*r)*Math.sin(lat2*r)-Math.sin(lat1*r)*Math.cos(lat2*r)*Math.cos(dLon);
  return(Math.atan2(y,x)/r+360)%360;
}
function bearDiff(a,b){return((a-b)+540)%360-180}

// ════════════════════════════════════════════
// REVERSE GEOCODE — Nominatim
// ════════════════════════════════════════════
async function fetchLocationName(lat, lon) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,
      {headers:{'User-Agent':'AURA-AR/2.0'}}
    );
    const d = await r.json();
    const a = d.address || {};
    const road = a.road || a.pedestrian || a.neighbourhood || '';
    const city = a.city || a.town || a.village || '';
    document.getElementById('np-name').textContent = (road || city || 'Live World').toUpperCase();
    document.getElementById('np-sub').innerHTML =
      `<span class="lpip"></span>${(city || 'AR LAYER').toUpperCase()}`;
  } catch(e){}
}

// ════════════════════════════════════════════
// COMPASS
// ════════════════════════════════════════════
function buildCompass() {
  const strip = document.getElementById('cs');
  strip.innerHTML = '';
  for (let i = 0; i < 720; i += 5) {
    const el = document.createElement('span');
    el.className = 'ct';
    const m = i % 360;
    if (m % 90 === 0)      { el.classList.add('mj'); el.textContent = ['N','E','S','W'][m/90]; }
    else if (m % 45 === 0) { el.classList.add('mj'); el.textContent = ['NE','SE','SW','NW'][(m/45-1)/2|0]; }
    else if (m % 30 === 0) { el.textContent = m + '°'; }
    else { el.textContent = '·'; }
    strip.appendChild(el);
  }
}

function updateCompass() {
  const strip = document.getElementById('cs');
  const wrap = document.getElementById('cw');
  const pxPer = strip.scrollWidth / 720;
  strip.style.transform = `translateX(${-(smoothH % 360) * pxPer + wrap.offsetWidth / 2}px)`;
  const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  const d = dirs[Math.round(smoothH/22.5)%16];
  document.getElementById('v-hdg').textContent = d + ' ' + Math.round(smoothH).toString().padStart(3,'0') + '°';
}

// ANCHOR DOM
// ════════════════════════════════════════════
function buildAnchors() {
  const layer = document.getElementById('anc-layer');
  layer.innerHTML = '';

  // Weather anchor
  if (weatherData.tempFStr) {
    const wa = {
      id:'weather', bearing:5, elev:18, cls:'vy', w:'170px',
      stem:85, sh:'-1s',
      ico:weatherData.icon, cat:'Live Weather', name:'Conditions Now',
      val:weatherData.tempFStr,
      sub:`${weatherData.desc} · ${weatherData.feelsF}°F feels like`,
      dist:'—',
      detail:{
        ico:weatherData.icon, type:'Weather · Open-Meteo API',
        title:'Live Conditions',
        stats:[
          {v:weatherData.tempFStr, l:'Temp'},
          {v:weatherData.humidity+'%', l:'Humidity'},
          {v:weatherData.wind+' mph', l:'Wind '+weatherData.windDir}
        ],
        desc:`${weatherData.desc}. Feels like ${weatherData.feelsF}°F. ` +
             `Visibility ${weatherData.vis}. ` +
             (weatherData.precip > 0 ? `Current precip: ${weatherData.precip}mm.` : 'No precipitation.')
      }
    };
    buildAnchorEl(layer, wa);
  }

  // Real places
  places.forEach((p, i) => {
    const dStr = p.dist >= 1000 ? (p.dist/1000).toFixed(1)+'km' : p.dist+'m';
    buildAnchorEl(layer, {
      id: p.id, bearing: p.bearing, elev: p.elev, cls: p.cls,
      w: '155px', stem: 50 + Math.random() * 45, sh: `${-(i*1.4)}s`,
      ico: p.ico, cat: p.cat, name: p.name,
      val: p.name.length > 14 ? p.name.slice(0,13)+'…' : p.name,
      sub: p.cat + ' · ' + dStr,
      dist: dStr,
      detail: {
        ico: p.ico, type: p.cat + ' · OpenStreetMap',
        title: p.name,
        stats: [
          {v: dStr, l:'Distance'},
          {v: Math.round(p.bearing)+'°', l:'Bearing'},
          {v: p.type.replace('_',' '), l:'Type'}
        ],
        desc: buildPlaceDesc(p)
      }
    });
  });
}

function buildAnchorEl(layer, a) {
  const el = document.createElement('div');
  el.className = `anc ${a.cls}`;
  el.id = 'an-' + a.id;
  el.style.setProperty('--w', a.w);
  el.style.setProperty('--sh', a.sh);
  el.dataset.bearing = a.bearing;
  el.dataset.elev = a.elev;
  el._detail = a.detail;
  el.innerHTML = `
    <div class="acard">
      <div class="acbr"></div>
      <div class="adist">${a.dist}</div>
      <div class="atype"><div class="atd"></div>${a.cat}</div>
      <div class="atitle">${a.ico} ${a.val}</div>
      <div class="asub">${a.sub}</div>
    </div>
    <div class="astem" style="height:${a.stem}px"></div>
    <div class="adot"></div>
  `;
  el.addEventListener('click', () => openPopup(a.id));
  el.addEventListener('touchend', e => { e.preventDefault(); openPopup(a.id); }, {passive:false});
  layer.appendChild(el);
}

function buildPlaceDesc(p) {
  const parts = [];
  if (p.tags) {
    if (p.tags.opening_hours) parts.push('Hours: ' + p.tags.opening_hours);
    if (p.tags.phone) parts.push('📞 ' + p.tags.phone);
    if (p.tags.cuisine) parts.push('Cuisine: ' + p.tags.cuisine);
    if (p.tags.brand) parts.push('Brand: ' + p.tags.brand);
    if (p.tags['addr:street']) parts.push('📍 ' + p.tags['addr:street']);
  }
  if (!parts.length) {
    parts.push(`${p.cat} ${p.dist}m ${degCompass(p.bearing)} of your location. Source: OpenStreetMap.`);
  }
  return parts.join(' · ');
}

// ════════════════════════════════════════════
// ANCHOR POSITION UPDATE
// ════════════════════════════════════════════
function updateAnchors() {
  const w = window.innerWidth, h = window.innerHeight;
  const hw = FOV_H / 2, hv = FOV_V / 2;
  let vis = 0;

  document.querySelectorAll('.anc').forEach(el => {
    const bear = parseFloat(el.dataset.bearing) || 0;
    const elev = parseFloat(el.dataset.elev) || 0;
    const dh = bearDiff(bear, smoothH);
    const dv = elev - smoothP;

    if (Math.abs(dh) < hw + 10 && Math.abs(dv) < hv + 14) {
      const sx = w/2 + (dh/hw) * (w/2);
      const sy = h/2 - (dv/hv) * (h/2) + 20;
      el.style.left = sx + 'px';
      el.style.top  = sy + 'px';
      const edge = Math.max(Math.abs(dh)/hw, Math.abs(dv)/hv);
      const alpha = Math.pow(Math.max(0, 1 - edge), 1.3);
      el.style.opacity = alpha.toFixed(3);
      el.classList.toggle('vis', alpha > 0.04);
      vis++;
    } else {
      el.style.opacity = '0';
      el.classList.remove('vis');
    }
  });

  document.getElementById('v-anc').textContent = vis;
}

// ════════════════════════════════════════════
// MAP ROTATION — sync heading to map bearing
// ════════════════════════════════════════════
function updateMap() {
  if (!map) return;
  // Rotate map bearing to match heading
  // pitch map to match device tilt (clamped)
  const mapPitch = Math.max(0, Math.min(75, 55 + smoothP * 0.8));
  map.setBearing(smoothH);
  map.setPitch(mapPitch);
  map.setCenter([userLon, userLat]);
}

// ════════════════════════════════════════════
// RADAR
// ════════════════════════════════════════════
function drawRadar() {
  const rc = document.getElementById('radar');
  const rctx = rc.getContext('2d');
  const cx = 39, cy = 39, R = 35;
  rctx.clearRect(0, 0, 78, 78);

  // BG is transparent (handled by CSS)
  [12,24].forEach(r => {
    rctx.beginPath(); rctx.arc(cx,cy,r,0,Math.PI*2);
    rctx.strokeStyle='rgba(0,255,209,0.07)'; rctx.lineWidth=1; rctx.stroke();
  });
  rctx.strokeStyle='rgba(0,255,209,0.07)'; rctx.lineWidth=1;
  rctx.beginPath();rctx.moveTo(cx-R,cy);rctx.lineTo(cx+R,cy);rctx.stroke();
  rctx.beginPath();rctx.moveTo(cx,cy-R);rctx.lineTo(cx,cy+R);rctx.stroke();

  // FOV wedge
  const wa = (smoothH - 90) * Math.PI/180;
  const hf = (FOV_H/2) * Math.PI/180;
  rctx.beginPath(); rctx.moveTo(cx,cy);
  rctx.arc(cx,cy,R-2,wa-hf,wa+hf); rctx.closePath();
  rctx.fillStyle='rgba(0,255,209,0.07)'; rctx.fill();
  rctx.strokeStyle='rgba(0,255,209,0.17)'; rctx.lineWidth=1; rctx.stroke();

  // Anchor blips
  document.querySelectorAll('.anc').forEach(el => {
    const bear = parseFloat(el.dataset.bearing) || 0;
    const rel = (bear - smoothH + 360) % 360;
    const rad = (rel - 90) * Math.PI/180;
    const bx = cx + Math.cos(rad) * 25;
    const by = cy + Math.sin(rad) * 25;
    const dh = Math.abs(bearDiff(bear, smoothH));
    const al = 0.3 + Math.max(0, 1 - dh/90) * 0.7;
    const cls = el.className;
    rctx.beginPath(); rctx.arc(bx,by,2.5,0,Math.PI*2);
    rctx.fillStyle = cls.includes('vr') ? `rgba(255,64,64,${al})`
                   : cls.includes('vo') ? `rgba(255,144,48,${al})`
                   : cls.includes('vy') ? `rgba(255,215,0,${al})`
                   : `rgba(0,255,209,${al})`;
    rctx.fill();
  });

  // You
  rctx.beginPath(); rctx.arc(cx,cy,3.5,0,Math.PI*2);
  rctx.fillStyle='#00FFD1';
  rctx.shadowColor='#00FFD1'; rctx.shadowBlur=10;
  rctx.fill(); rctx.shadowBlur=0;
}

// ════════════════════════════════════════════
// POPUP
// ════════════════════════════════════════════
function openPopup(id) {
  const el = document.getElementById('an-' + id);
  if (!el || !el._detail) return;
  const d = el._detail;
  document.getElementById('p-ico').textContent = d.ico;
  document.getElementById('p-type').textContent = d.type;
  document.getElementById('p-title').textContent = d.title;
  const sh = d.stats.map(s => `
    <div class="pstat">
      <div class="psv">${s.v}</div>
      <div class="psl">${s.l}</div>
    </div>`).join('');
  document.getElementById('p-body').innerHTML = `
    <div class="psg">${sh}</div>
    <div class="pdesc">${d.desc}</div>
    <div class="pacts">
      <button class="pact pa" onclick="closePopup()">⬡ Tag Here</button>
      <button class="pact ps2" onclick="closePopup()">Dismiss</button>
    </div>`;
  document.getElementById('popup').classList.add('on');
  doFlash();
  playTone(440, 0.08, 0.15);
}
function closePopup() { document.getElementById('popup').classList.remove('on'); }

function doFlash() {
  const f = document.getElementById('flash');
  f.classList.add('on');
  setTimeout(() => f.classList.remove('on'), 180);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('on'), 3000);
}

// ════════════════════════════════════════════
// SPATIAL AUDIO — Web Audio API
// ════════════════════════════════════════════
function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioEnabled = true;
  } catch(e) {}
}

function playTone(freq=440, gain=0.06, dur=0.1) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gainNode.gain.setValueAtTime(gain, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gainNode); gainNode.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

// Ambient spatial audio — quiet drone that pans as you turn
function initAmbientAudio() {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    const panner = audioCtx.createPanner();
    osc.type = 'sine';
    osc.frequency.value = 80;
    gainNode.gain.value = 0.012;
    panner.panningModel = 'HRTF';
    panner.setPosition(0, 0, -1);
    osc.connect(gainNode); gainNode.connect(panner); panner.connect(audioCtx.destination);
    osc.start();
    // Update panner position based on heading
    setInterval(() => {
      if (!audioCtx) return;
      const rad = smoothH * Math.PI / 180;
      panner.setPosition(Math.sin(rad), 0, -Math.cos(rad));
    }, 100);
  } catch(e) {}
}

function buildAudioViz() {
  const viz = document.getElementById('audio-viz');
  viz.innerHTML = '';
  for (let i = 0; i < 48; i++) {
    const bar = document.createElement('div');
    bar.className = 'av-bar';
    const height = 3 + Math.random() * 22;
    bar.style.setProperty('--h', height + 'px');
    bar.style.setProperty('--d', (0.3 + Math.random() * 0.8) + 's');
    bar.style.setProperty('--dl', (Math.random() * 0.5) + 's');
    viz.appendChild(bar);
  }
}

// ════════════════════════════════════════════
// DEVICE ORIENTATION — real gyro
// ════════════════════════════════════════════
function initSensors() {
  const handler = e => {
    hasSensor = true;
    if (e.webkitCompassHeading !== undefined) {
      heading = e.webkitCompassHeading;
    } else if (e.alpha !== null) {
      heading = (360 - (e.alpha || 0) + 360) % 360;
    }
    pitch = Math.max(-28, Math.min(28, (e.beta || 0) - 45));
  };

  if (typeof DeviceOrientationEvent !== 'undefined') {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      // iOS 13 — show enable button after boot
      const btn = document.createElement('button');
      btn.id = 'motionbtn';
      btn.textContent = 'ENABLE MOTION';
      btn.style.cssText = [
        'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)',
        'z-index:50;padding:13px 30px',
        'background:rgba(0,255,209,0.08);border:1px solid rgba(0,255,209,0.3)',
        'border-radius:9px;font-family:Orbitron,monospace;font-size:10px',
        'letter-spacing:.16em;color:#00FFD1;cursor:pointer;display:none'
      ].join(';');
      document.body.appendChild(btn);
      btn.onclick = () => {
        initAudio();
        DeviceOrientationEvent.requestPermission().then(s => {
          if (s === 'granted') {
            window.addEventListener('deviceorientation', handler, true);
            hasSensor = true;
            initAmbientAudio();
            document.getElementById('audio-viz').classList.add('on');
          }
          btn.remove();
          showToast('✓ Motion & Audio active');
        });
      };
      setTimeout(() => { btn.style.display = 'block'; }, 2500);
    } else {
      window.addEventListener('deviceorientationabsolute', handler, true);
      window.addEventListener('deviceorientation', handler, true);
    }
  }

  // Desktop: click to enable audio
  document.addEventListener('click', () => {
    if (!audioCtx) { initAudio(); initAmbientAudio(); }
  }, {once: true});
}

// ════════════════════════════════════════════
// DRAG (desktop / fallback)
// ════════════════════════════════════════════
let dragActive = false, lastDX = 0, lastDY = 0;
function initDrag() {
  const dn = (x,y) => { dragActive=true; lastDX=x; lastDY=y; };
  const mv = (x,y) => {
    if (!dragActive) return;
    heading = (heading - (x-lastDX)*0.35 + 360) % 360;
    pitch = Math.max(-26, Math.min(26, pitch + (y-lastDY)*0.18));
    lastDX=x; lastDY=y;
  };
  const up = () => { dragActive=false; };
  document.addEventListener('mousedown', e => { if (!e.target.closest('#popup,.pact,#motionbtn')) dn(e.clientX,e.clientY); });
  document.addEventListener('mousemove', e => mv(e.clientX,e.clientY));
  document.addEventListener('mouseup', up);
  document.addEventListener('touchstart', e => {
    if (!e.target.closest('#popup,.pact,.anc,#motionbtn')) dn(e.touches[0].clientX,e.touches[0].clientY);
  }, {passive:true});
  document.addEventListener('touchmove', e => {
    if (dragActive) mv(e.touches[0].clientX,e.touches[0].clientY);
  }, {passive:true});
  document.addEventListener('touchend', up);
}

// ════════════════════════════════════════════
// MAIN LOOP
// ════════════════════════════════════════════
function startLoop() {
  buildCompass();
  initDrag();

  function loop() {
    requestAnimationFrame(loop);
    t += 0.016; frame++;

    // Smooth heading
    let dh = ((heading - smoothH) + 540) % 360 - 180;
    smoothH = (smoothH + dh * (hasSensor ? 0.14 : SMOOTH) + 360) % 360;

    // Smooth pitch
    if (!dragActive && !hasSensor) pitch *= 0.94;
    smoothP += (pitch - smoothP) * 0.12;

    // Update map bearing & pitch
    if (frame % 2 === 0) updateMap();

    // Update HUD anchors
    updateAnchors();

    if (frame % 2 === 0) { updateCompass(); drawRadar(); }

    if (frame % 60 === 0) {
      const now = new Date();
      const h = now.getHours(), m = now.getMinutes().toString().padStart(2,'0');
      document.getElementById('v-time').textContent = `${h>12?h-12:h||12}:${m}`;
      document.getElementById('v-pitch').textContent = (smoothP>=0?'+':'') + Math.round(smoothP) + '°';
    }
  }
  loop();
}

// ════════════════════════════════════════════
// GO
// ════════════════════════════════════════════
boot();
</script>
