<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AURA ¬Ј AR</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'DM Mono',monospace;color:#fff;touch-action:none;user-select:none;-webkit-user-select:none}
body.dragging{cursor:grabbing}
:root{--c:#00FFD1;--cd:rgba(0,255,209,0.12);--cb:rgba(0,255,209,0.28);--r:#FF4040;--o:#FF9030;--y:#FFD700;--mono:'DM Mono',monospace;--disp:'Orbitron',monospace}

/* CAMERA */
#cam{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
#cam-fallback{
  position:fixed;inset:0;z-index:0;display:none;
  background:linear-gradient(160deg,#020810 0%,#060e1c 50%,#030610 100%);
}
#cam-fallback::before{
  content:'';position:absolute;bottom:0;left:0;right:0;height:52%;background:#060d1a;
  clip-path:polygon(0 100%,0 65%,2% 65%,2% 48%,4% 48%,4% 58%,5% 58%,5% 38%,6% 38%,6% 52%,8% 52%,8% 42%,9% 42%,9% 30%,10% 30%,10% 22%,11% 22%,11% 18%,12% 18%,12% 14%,13% 14%,13% 18%,14% 18%,14% 22%,15% 22%,15% 42%,17% 42%,17% 30%,19% 30%,19% 48%,21% 48%,21% 36%,23% 36%,23% 26%,25% 26%,25% 44%,27% 44%,27% 34%,29% 34%,29% 29%,30% 29%,30% 24%,31% 24%,31% 19%,32% 19%,32% 16%,33% 16%,33% 12%,34% 12%,34% 16%,35% 16%,35% 19%,36% 19%,36% 46%,38% 46%,38% 32%,40% 32%,40% 50%,42% 50%,42% 37%,44% 37%,44% 28%,46% 28%,46% 20%,47% 20%,47% 16%,48% 16%,48% 12%,49% 12%,49% 16%,50% 16%,50% 20%,51% 20%,51% 28%,53% 28%,53% 38%,55% 38%,55% 52%,57% 52%,57% 34%,59% 34%,59% 44%,61% 44%,61% 27%,63% 27%,63% 42%,65% 42%,65% 22%,66% 22%,66% 18%,67% 18%,67% 22%,68% 22%,68% 46%,70% 46%,70% 36%,72% 36%,72% 50%,74% 50%,74% 32%,76% 32%,76% 54%,78% 54%,78% 40%,80% 40%,80% 30%,82% 30%,82% 48%,84% 48%,84% 38%,86% 38%,86% 54%,88% 54%,88% 42%,90% 42%,90% 50%,92% 50%,92% 44%,94% 44%,94% 58%,96% 58%,96% 62%,98% 62%,98% 66%,100% 66%,100% 100%)
}
#cam-fallback::after{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,0.7) 0%,transparent 100%),radial-gradient(1px 1px at 25% 8%,rgba(255,255,255,0.5) 0%,transparent 100%),radial-gradient(1px 1px at 40% 20%,rgba(255,255,255,0.6) 0%,transparent 100%),radial-gradient(1px 1px at 60% 12%,rgba(255,255,255,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 75% 6%,rgba(255,255,255,0.7) 0%,transparent 100%),radial-gradient(1px 1px at 88% 18%,rgba(255,255,255,0.5) 0%,transparent 100%),radial-gradient(1px 1px at 50% 5%,rgba(255,255,255,0.6) 0%,transparent 100%),radial-gradient(2px 2px at 82% 10%,rgba(200,220,255,0.4) 0%,transparent 100%);
}

/* LENS */
#lens{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 110% 90% at 50% 50%,rgba(0,255,209,0.01) 0%,transparent 55%,rgba(0,0,0,0.55) 100%)}
#lens::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px)}
#lens::after{content:'';position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,255,209,0.45) 35%,rgba(0,255,209,0.8) 50%,rgba(0,255,209,0.45) 65%,transparent);animation:scan 9s linear infinite;opacity:0.28}
@keyframes scan{0%{top:-2px}100%{top:100vh}}

/* HUD */
#hud{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.brk{position:absolute;width:50px;height:50px}.brk svg{width:100%;height:100%}
.tl{top:12px;left:12px}.tr{top:12px;right:12px;transform:scaleX(-1)}
.bl{bottom:12px;left:12px;transform:scaleY(-1)}.br2{bottom:12px;right:12px;transform:scale(-1,-1)}

#nameplate{position:absolute;top:0;left:50%;transform:translateX(-50%);background:rgba(0,2,10,0.72);border:1px solid rgba(0,255,209,0.14);border-top:none;border-radius:0 0 10px 10px;padding:8px 22px 9px;backdrop-filter:blur(20px);text-align:center}
.np-name{font-family:var(--disp);font-size:10px;font-weight:700;letter-spacing:.22em;color:rgba(255,255,255,0.9)}
.np-sub{font-size:8px;letter-spacing:.13em;color:rgba(0,255,209,0.45);margin-top:2px;display:flex;align-items:center;justify-content:center;gap:5px}
.lpip{width:5px;height:5px;border-radius:50%;background:var(--r);box-shadow:0 0 6px var(--r);animation:pip 1s ease infinite;flex-shrink:0}
@keyframes pip{0%,100%{opacity:1}50%{opacity:.1}}

#cw{position:absolute;top:58px;left:50%;transform:translateX(-50%);width:min(360px,84vw);overflow:hidden;pointer-events:none}
#ci{display:flex;align-items:center;padding:5px 0;background:rgba(0,2,10,0.65);border:1px solid rgba(255,255,255,0.07);border-radius:7px;backdrop-filter:blur(14px);position:relative}
#cs{display:flex;align-items:center;white-space:nowrap;will-change:transform}
.ct{font-size:8px;letter-spacing:.04em;padding:0 7px;color:rgba(255,255,255,0.13);flex-shrink:0}
.ct.mj{color:rgba(0,255,209,0.44);font-size:9px}
.caret{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:5px solid var(--c);filter:drop-shadow(0 0 4px var(--c))}

.cst{position:absolute;top:18px;display:flex;flex-direction:column;gap:2px}
.cst.L{left:70px}.cst.R{right:70px;align-items:flex-end}
.cl{font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,255,209,0.3)}
.cv{font-family:var(--disp);font-size:11px;font-weight:500;color:var(--c);text-shadow:0 0 14px rgba(0,255,209,0.45);letter-spacing:.05em}

#ret{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.ri{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%}
.r1{width:50px;height:50px;border:1px solid rgba(0,255,209,0.14);animation:rs 12s linear infinite}
.r2{width:26px;height:26px;border:1px solid rgba(0,255,209,0.22)}
@keyframes rs{to{transform:translate(-50%,-50%) rotate(360deg)}}
.rdot{width:4px;height:4px;border-radius:50%;background:var(--c);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 12px var(--c);animation:rp 2s ease infinite}
@keyframes rp{0%,100%{box-shadow:0 0 8px var(--c)}50%{box-shadow:0 0 22px var(--c),0 0 44px rgba(0,255,209,0.2)}}
.rt{position:absolute;background:rgba(0,255,209,0.38)}
.rh{height:1px;width:9px;top:50%;left:-13px;transform:translateY(-50%)}
.rh2{height:1px;width:9px;top:50%;right:-13px;transform:translateY(-50%)}
.rv{width:1px;height:9px;left:50%;top:-13px;transform:translateX(-50%)}
.rv2{width:1px;height:9px;left:50%;bottom:-13px;transform:translateX(-50%)}

/* ANCHORS */
.anc{position:absolute;transform:translate(-50%,-50%);pointer-events:all;cursor:pointer;opacity:0;transition:opacity .45s ease}
.anc.vis{opacity:1}
.adot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--c);background:rgba(0,255,209,0.1);box-shadow:0 0 18px rgba(0,255,209,0.38);margin:0 auto;position:relative;z-index:2;animation:adp 2.5s ease-in-out infinite;transition:all .2s}
.anc:hover .adot{transform:scale(1.4);background:rgba(0,255,209,0.24);box-shadow:0 0 30px rgba(0,255,209,0.65)}
@keyframes adp{0%,100%{box-shadow:0 0 14px rgba(0,255,209,0.38)}50%{box-shadow:0 0 28px rgba(0,255,209,0.65),0 0 50px rgba(0,255,209,0.15)}}
.astem{width:1px;background:linear-gradient(to top,rgba(0,255,209,0.52),transparent);margin:0 auto;opacity:.45;animation:sp 3s ease-in-out infinite}
@keyframes sp{0%,100%{opacity:.35}50%{opacity:.65}}
.acard{background:rgba(0,2,12,0.82);border:1px solid rgba(0,255,209,0.24);border-radius:9px;padding:10px 13px;position:relative;overflow:hidden;backdrop-filter:blur(22px) saturate(160%);box-shadow:0 2px 30px rgba(0,0,0,0.6),inset 0 1px 0 rgba(0,255,209,0.07);min-width:var(--w,145px);transition:border-color .2s,box-shadow .2s}
.anc:hover .acard{border-color:rgba(0,255,209,0.52);box-shadow:0 4px 50px rgba(0,0,0,.75),0 0 28px rgba(0,255,209,0.1)}
.acard::before{content:'';position:absolute;top:4px;left:4px;width:7px;height:7px;border-top:1px solid rgba(0,255,209,0.5);border-left:1px solid rgba(0,255,209,0.5)}
.acbr{position:absolute;bottom:4px;right:4px;width:7px;height:7px;border-bottom:1px solid rgba(0,255,209,0.5);border-right:1px solid rgba(0,255,209,0.5)}
.acard::after{content:'';position:absolute;top:0;left:-70%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.03),transparent);transform:skewX(-15deg);animation:sh 9s ease-in-out infinite;animation-delay:var(--sh,0s)}
@keyframes sh{0%,60%,100%{left:-70%}38%{left:130%}}
.atype{font-size:7px;letter-spacing:.17em;text-transform:uppercase;color:rgba(0,255,209,0.44);margin-bottom:5px;display:flex;align-items:center;gap:4px}
.atd{width:3px;height:3px;border-radius:50%;background:var(--c);box-shadow:0 0 5px var(--c);animation:pip 2s ease infinite}
.atitle{font-family:var(--disp);font-size:10px;font-weight:700;letter-spacing:.02em;color:rgba(255,255,255,0.92);line-height:1.3;margin-bottom:3px}
.aval{font-family:var(--disp);font-size:13px;font-weight:700;color:var(--c);text-shadow:0 0 10px rgba(0,255,209,0.4);line-height:1.2}
.asub{font-size:8px;color:rgba(255,255,255,0.25);margin-top:2px}
.adist{position:absolute;top:7px;right:10px;font-size:7px;color:rgba(0,255,209,0.32);letter-spacing:.06em}
.vr .adot{border-color:var(--r);background:rgba(255,64,64,0.08);box-shadow:0 0 16px rgba(255,64,64,0.35)}.vr .astem{background:linear-gradient(to top,rgba(255,64,64,0.5),transparent)}.vr .acard{border-color:rgba(255,64,64,0.22)}.vr .acard::before,.vr .acbr{border-color:rgba(255,64,64,0.45)}.vr .atype,.vr .aval{color:var(--r)}.vr .atd{background:var(--r);box-shadow:0 0 5px var(--r)}
.vo .adot{border-color:var(--o);background:rgba(255,144,48,0.08);box-shadow:0 0 16px rgba(255,144,48,0.35)}.vo .astem{background:linear-gradient(to top,rgba(255,144,48,0.5),transparent)}.vo .acard{border-color:rgba(255,144,48,0.22)}.vo .acard::before,.vo .acbr{border-color:rgba(255,144,48,0.45)}.vo .atype,.vo .aval{color:var(--o)}.vo .atd{background:var(--o);box-shadow:0 0 5px var(--o)}
.vy .adot{border-color:var(--y);background:rgba(255,215,0,0.07);box-shadow:0 0 16px rgba(255,215,0,0.3)}.vy .astem{background:linear-gradient(to top,rgba(255,215,0,0.45),transparent)}.vy .acard{border-color:rgba(255,215,0,0.2)}.vy .acard::before,.vy .acbr{border-color:rgba(255,215,0,0.38)}.vy .atype,.vy .aval{color:var(--y)}.vy .atd{background:var(--y);box-shadow:0 0 5px var(--y)}

/* WEATHER */
#weather-strip{position:fixed;top:0;right:0;display:none;background:rgba(0,2,10,0.72);border-left:1px solid rgba(0,255,209,0.12);border-bottom:1px solid rgba(0,255,209,0.12);border-radius:0 0 0 10px;padding:8px 14px;backdrop-filter:blur(16px);pointer-events:none;z-index:3;text-align:right}
.ws-temp{font-family:var(--disp);font-size:16px;font-weight:700;color:var(--c);text-shadow:0 0 14px rgba(0,255,209,0.4);letter-spacing:.04em}
.ws-desc{font-size:8px;letter-spacing:.1em;color:rgba(255,255,255,0.35);margin-top:2px}
.ws-det{font-size:7px;letter-spacing:.08em;color:rgba(0,255,209,0.3);margin-top:1px}

/* POPUP */
#popup{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(16px);width:min(340px,90vw);background:rgba(0,2,12,0.94);border:1px solid rgba(0,255,209,0.28);border-radius:14px;backdrop-filter:blur(30px);z-index:10;opacity:0;pointer-events:none;transition:all .32s cubic-bezier(.34,1.1,.64,1);box-shadow:0 16px 60px rgba(0,0,0,0.85)}
#popup.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}
.ph{padding:15px 17px 12px;border-bottom:1px solid rgba(0,255,209,0.07);display:flex;align-items:flex-start;gap:11px}
.pico{width:38px;height:38px;border-radius:10px;border:1px solid rgba(0,255,209,0.18);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:rgba(0,255,209,0.04)}
.pmet{flex:1}.ptyp{font-size:7px;letter-spacing:.17em;text-transform:uppercase;color:rgba(0,255,209,0.44);margin-bottom:3px}
.ptit{font-family:var(--disp);font-size:13px;font-weight:700;color:rgba(255,255,255,0.9);letter-spacing:.01em}
.pcl{width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,0.04);border:none;display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(255,255,255,0.3);cursor:pointer;transition:all .2s;flex-shrink:0}
.pcl:hover{background:rgba(255,64,64,0.12);color:var(--r)}
.pb{padding:14px 17px 17px;display:flex;flex-direction:column;gap:11px}
.psg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pst{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:9px;padding:11px 9px;text-align:center}
.psv{font-family:var(--disp);font-size:16px;font-weight:700;color:var(--c)}
.psl{font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.22);margin-top:3px}
.pdesc{font-size:10px;color:rgba(255,255,255,0.36);line-height:1.8}
.pacts{display:flex;gap:8px}
.pact{flex:1;padding:11px;border-radius:9px;font-family:var(--disp);font-size:9px;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.pa{background:rgba(0,255,209,0.07);border:1px solid rgba(0,255,209,0.27);color:var(--c)}.pa:hover{background:rgba(0,255,209,0.14);box-shadow:0 0 20px rgba(0,255,209,0.14)}
.ps2{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.36)}.ps2:hover{color:rgba(255,255,255,0.75);border-color:rgba(255,255,255,0.22)}

/* RADAR + MISC */
#radar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:3;background:rgba(0,2,12,0.78);border:1px solid rgba(0,255,209,0.18);border-radius:50%}
.bst{position:fixed;z-index:3;pointer-events:none;bottom:18px}
.bst.L{left:68px}.bst.R{right:68px;text-align:right}
.bv{font-family:var(--disp);font-size:10px;font-weight:500;color:var(--c);text-shadow:0 0 10px rgba(0,255,209,0.4);letter-spacing:.05em}
.bl2{font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:rgba(0,255,209,0.28);margin-top:2px}
#toast{position:fixed;top:76px;left:50%;transform:translateX(-50%) translateY(-10px);background:rgba(0,2,12,0.92);border:1px solid rgba(0,255,209,0.26);border-radius:10px;padding:9px 18px;font-size:11px;color:rgba(0,255,209,0.8);letter-spacing:.08em;backdrop-filter:blur(18px);z-index:30;opacity:0;pointer-events:none;transition:all .3s ease;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#flash{position:fixed;inset:0;pointer-events:none;z-index:20;border:1.5px solid transparent;opacity:0;transition:opacity .1s;border-radius:3px}
#flash.on{border-color:rgba(0,255,209,0.55);box-shadow:inset 0 0 80px rgba(0,255,209,0.04);opacity:1}
#hint{position:fixed;top:50%;left:50%;transform:translate(-50%,58px);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(0,255,209,0.2);pointer-events:none;z-index:3;animation:hf 5s ease 2.5s forwards}
@keyframes hf{0%{opacity:1}100%{opacity:0}}

/* BOOT */
#boot{position:fixed;inset:0;z-index:100;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;padding:40px}
.blogo{font-family:var(--disp);font-size:38px;font-weight:900;letter-spacing:.16em;color:var(--c);text-shadow:0 0 44px rgba(0,255,209,0.35);margin-bottom:6px}
.bsub{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:rgba(0,255,209,0.32);margin-bottom:28px}
.bsteps{display:flex;flex-direction:column;gap:11px;min-width:280px;margin-bottom:16px}
.bstep{display:flex;align-items:center;gap:11px;font-size:10px;letter-spacing:.08em;color:rgba(255,255,255,0.18);transition:color .4s}
.bstep.ok{color:var(--c)}.bstep.err{color:rgba(255,64,64,0.65)}.bstep.run{color:rgba(255,255,255,0.45)}
.bdot{width:6px;height:6px;border-radius:50%;border:1px solid currentColor;flex-shrink:0;transition:background .3s}
.bstep.ok .bdot,.bstep.err .bdot{background:currentColor}
.bbar{width:280px;height:2px;background:rgba(255,255,255,0.05);border-radius:999px;overflow:hidden}
.bfill{height:100%;background:linear-gradient(90deg,#7C5CFC,var(--c));width:0%;transition:width .4s ease;border-radius:999px}
</style>
</head>
<body>

<video id="cam" autoplay muted playsinline></video>
<div id="cam-fallback"></div>
<div id="lens"></div>

<div id="hud">
  <div class="brk tl"><svg viewBox="0 0 50 50" fill="none"><path d="M2 20L2 2L20 2" stroke="rgba(0,255,209,0.55)" stroke-width="1.5"/><path d="M2 8L2 2L8 2" stroke="rgba(0,255,209,0.92)" stroke-width="1"/></svg></div>
  <div class="brk tr"><svg viewBox="0 0 50 50" fill="none"><path d="M2 20L2 2L20 2" stroke="rgba(0,255,209,0.55)" stroke-width="1.5"/><path d="M2 8L2 2L8 2" stroke="rgba(0,255,209,0.92)" stroke-width="1"/></svg></div>
  <div class="brk bl"><svg viewBox="0 0 50 50" fill="none"><path d="M2 20L2 2L20 2" stroke="rgba(0,255,209,0.55)" stroke-width="1.5"/><path d="M2 8L2 2L8 2" stroke="rgba(0,255,209,0.92)" stroke-width="1"/></svg></div>
  <div class="brk br2"><svg viewBox="0 0 50 50" fill="none"><path d="M2 20L2 2L20 2" stroke="rgba(0,255,209,0.55)" stroke-width="1.5"/><path d="M2 8L2 2L8 2" stroke="rgba(0,255,209,0.92)" stroke-width="1"/></svg></div>
  <div id="nameplate"><div class="np-name" id="np-name">ACQUIRINGвА¶</div><div class="np-sub"><span class="lpip"></span><span id="np-sub">LIVE AR</span></div></div>
  <div id="cw"><div id="ci"><div id="cs"></div><div class="caret"></div></div></div>
  <div class="cst L"><div class="cl">Heading</div><div class="cv" id="v-hdg">---¬∞</div></div>
  <div class="cst R"><div class="cl">Nearby</div><div class="cv" id="v-anc">0</div></div>
  <div id="ret"><div style="position:relative;width:50px;height:50px"><div class="ri r1"></div><div class="ri r2"></div><div class="rdot"></div><div class="rt rh"></div><div class="rt rh2"></div><div class="rt rv"></div><div class="rt rv2"></div></div></div>
  <div id="anc-layer"></div>
</div>

<div id="weather-strip"><div class="ws-temp" id="ws-temp">--¬∞F</div><div class="ws-desc" id="ws-desc"></div><div class="ws-det" id="ws-det"></div></div>

<div id="popup">
  <div class="ph"><div class="pico" id="p-ico"></div><div class="pmet"><div class="ptyp" id="p-type"></div><div class="ptit" id="p-title"></div></div><button class="pcl" onclick="closePopup()">вЬХ</button></div>
  <div class="pb" id="p-body"></div>
</div>

<canvas id="radar" width="78" height="78"></canvas>
<div class="bst L"><div class="bv" id="v-pitch">+0¬∞</div><div class="bl2">Pitch</div></div>
<div class="bst R"><div class="bv" id="v-time">--:--</div><div class="bl2">Local</div></div>
<div id="toast"></div>
<div id="flash"></div>
<div id="hint">вЖР drag to look around вЖТ</div>

<div id="boot">
  <div class="blogo">AURA</div>
  <div class="bsub">Live AR ¬Ј First Person</div>
  <div class="bsteps">
    <div class="bstep" id="s1"><div class="bdot"></div>Camera access</div>
    <div class="bstep" id="s2"><div class="bdot"></div>GPS location</div>
    <div class="bstep" id="s3"><div class="bdot"></div>Live weather</div>
    <div class="bstep" id="s4"><div class="bdot"></div>Nearby places (OSM)</div>
    <div class="bstep" id="s5"><div class="bdot"></div>Motion sensors</div>
  </div>
  <div class="bbar"><div class="bfill" id="bfill"></div></div>
</div>

<script>
'use strict';
const FOV_H=72,FOV_V=52,SMOOTH=0.1;
let userLat=40.758,userLon=-73.9855,heading=0,smoothH=0,pitch=0,smoothP=0;
let hasSensor=false,dragActive=false,lastX=0,lastY=0,frame=0;
let weatherData={},places=[],audioCtx=null;

const setStep=(id,st,tx)=>{const el=document.getElementById(id);el.className='bstep '+st;if(tx)el.querySelector('.bdot').nextSibling.textContent=' '+tx};
const setP=p=>{document.getElementById('bfill').style.width=p+'%'};
const delay=ms=>new Promise(r=>setTimeout(r,ms));

async function boot(){
  // S1 Camera
  setStep('s1','run');
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});
    const v=document.getElementById('cam');v.srcObject=stream;
    await new Promise(r=>{v.onloadedmetadata=()=>{v.play();r()}});
    setStep('s1','ok','Camera active');
  }catch(e){
    setStep('s1','err','No camera вАФ skyline mode');
    document.getElementById('cam').style.display='none';
    document.getElementById('cam-fallback').style.display='block';
  }
  setP(18);

  // S2 GPS
  setStep('s2','run');
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation?navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true,timeout:10000}):rej());
    userLat=pos.coords.latitude;userLon=pos.coords.longitude;
    setStep('s2','ok',userLat.toFixed(4)+', '+userLon.toFixed(4));
  }catch(e){setStep('s2','err','GPS denied вАФ Times Square')}
  setP(36);

  // S3 Weather
  setStep('s3','run');
  try{
    weatherData=await fetchWeather(userLat,userLon);
    setStep('s3','ok',weatherData.tempFStr+' ¬Ј '+weatherData.desc);
    updateWeatherUI();
  }catch(e){setStep('s3','err','Weather unavailable')}
  setP(55);

  // S4 Places
  setStep('s4','run');
  try{
    places=await fetchPlaces(userLat,userLon);
    if(!places.length)throw 0;
    setStep('s4','ok',places.length+' anchors found');
  }catch(e){places=getMock();setStep('s4','err',places.length+' demo anchors')}
  buildAnchors();
  setP(75);

  // S5 Sensors
  setStep('s5','run');
  initSensors();
  await delay(500);
  setStep('s5','ok',hasSensor?'Gyro active':'Drag-to-look');
  setP(100);
  await delay(700);

  const b=document.getElementById('boot');
  b.style.transition='opacity .8s';b.style.opacity='0';
  setTimeout(()=>{
    b.style.display='none';
    buildCompass();initDrag();startLoop();
    fetchLocationName(userLat,userLon);
    if(navigator.geolocation)navigator.geolocation.watchPosition(p=>{userLat=p.coords.latitude;userLon=p.coords.longitude},null,{enableHighAccuracy:true,maximumAge:3000});
    showToast('вђ° AR layer live ¬Ј '+places.length+' anchors nearby');
  },800);
}

async function fetchWeather(lat,lon){
  const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,precipitation,visibility&temperature_unit=celsius&wind_speed_unit=mph&timezone=auto`);
  const d=await r.json(),c=d.current;
  const tF=Math.round(c.temperature_2m*9/5+32),fF=Math.round(c.apparent_temperature*9/5+32);
  const WD={0:'Clear',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',45:'Foggy',51:'Light Drizzle',53:'Drizzle',61:'Light Rain',63:'Rain',65:'Heavy Rain',71:'Light Snow',73:'Snow',80:'Showers',95:'Thunderstorm'};
  const WI={0:'вШАпЄП',1:'рЯМ§пЄП',2:'вЫЕ',3:'вШБпЄП',45:'рЯМЂпЄП',61:'рЯМІпЄП',63:'рЯМІпЄП',71:'вЭДпЄП',80:'рЯМ¶пЄП',95:'вЫИпЄП'};
  const dc=d=>['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];
  const vis=c.visibility?(c.visibility>=1000?(c.visibility/1000).toFixed(1)+'km':c.visibility+'m'):'вАФ';
  return{tempF:tF,feelsF:fF,tempFStr:tF+'¬∞F',desc:WD[c.weather_code]||'Clear',icon:WI[c.weather_code]||'рЯМ°пЄП',humidity:c.relative_humidity_2m,wind:Math.round(c.wind_speed_10m),windDir:dc(c.wind_direction_10m||0),precip:c.precipitation,vis};
}

function updateWeatherUI(){
  if(!weatherData.tempFStr)return;
  document.getElementById('ws-temp').textContent=weatherData.icon+' '+weatherData.tempFStr;
  document.getElementById('ws-desc').textContent=weatherData.desc;
  document.getElementById('ws-det').textContent='Feels '+weatherData.feelsF+'¬∞F ¬Ј '+weatherData.wind+'mph '+weatherData.windDir+' ¬Ј '+weatherData.humidity+'% humidity';
  document.getElementById('weather-strip').style.display='block';
}

async function fetchPlaces(lat,lon){
  const R=250,q=`[out:json][timeout:12];(node[amenity~"restaurant|cafe|bar|bank|pharmacy|hospital|cinema|hotel|fast_food|fuel|supermarket|pub|library|theatre|nightclub"](around:${R},${lat},${lon});node[shop~"convenience|clothes|electronics|bakery|bookshop"](around:${R},${lat},${lon});node[tourism~"attraction|museum|viewpoint|artwork|gallery"](around:${R},${lat},${lon});node[leisure~"park|fitness_centre"](around:${R},${lat},${lon});node[historic~"monument|memorial|castle|ruins"](around:${R},${lat},${lon});)->.r;.r out body;`;
  const resp=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'data='+encodeURIComponent(q)});
  const data=await resp.json();
  return(data.elements||[]).filter(e=>e.tags&&e.tags.name).slice(0,14).map(e=>{
    const tp=e.tags.amenity||e.tags.shop||e.tags.tourism||e.tags.leisure||e.tags.historic||'place';
    const{ico,cls,cat}=cls_(tp);
    return{id:'osm_'+e.id,name:e.tags.name,type:tp,ico,cls,cat,lat:e.lat,lon:e.lon,dist:hav(lat,lon,e.lat,e.lon),bearing:brg(lat,lon,e.lat,e.lon),elev:4+Math.random()*14,tags:e.tags};
  });
}

function getMock(){return[{id:'m1',name:'Central Caf√©',type:'cafe',ico:'вШХ',cls:'',cat:'Caf√©',bearing:22,dist:55,elev:8,tags:{}},{id:'m2',name:'Grand Market',type:'supermarket',ico:'рЯЫТ',cls:'vo',cat:'Supermarket',bearing:75,dist:140,elev:5,tags:{}},{id:'m3',name:'Metro Station',type:'transit',ico:'рЯЪЗ',cls:'vr',cat:'Transit',bearing:110,dist:90,elev:2,tags:{}},{id:'m4',name:'City Park',type:'park',ico:'рЯМ≥',cls:'',cat:'Park',bearing:160,dist:200,elev:6,tags:{}},{id:'m5',name:'Grand Hotel',type:'hotel',ico:'рЯП®',cls:'vy',cat:'Hotel',bearing:210,dist:180,elev:18,tags:{}},{id:'m6',name:'Art Museum',type:'museum',ico:'рЯПЫпЄП',cls:'vy',cat:'Museum',bearing:255,dist:220,elev:14,tags:{}},{id:'m7',name:'Rooftop Bar',type:'bar',ico:'рЯНє',cls:'vo',cat:'Bar',bearing:300,dist:85,elev:22,tags:{}},{id:'m8',name:'Pharmacy',type:'pharmacy',ico:'рЯТК',cls:'vr',cat:'Pharmacy',bearing:340,dist:65,elev:4,tags:{}}]}

function cls_(t){const M={restaurant:{ico:'рЯНљпЄП',cls:'',cat:'Restaurant'},cafe:{ico:'вШХ',cls:'',cat:'Caf√©'},bar:{ico:'рЯНЇ',cls:'vo',cat:'Bar'},pub:{ico:'рЯНЇ',cls:'vo',cat:'Pub'},nightclub:{ico:'рЯОґ',cls:'vo',cat:'Club'},bank:{ico:'рЯП¶',cls:'',cat:'Bank'},pharmacy:{ico:'рЯТК',cls:'vr',cat:'Pharmacy'},hospital:{ico:'рЯП•',cls:'vr',cat:'Hospital'},library:{ico:'рЯУЪ',cls:'vy',cat:'Library'},cinema:{ico:'рЯОђ',cls:'',cat:'Cinema'},theatre:{ico:'рЯО≠',cls:'',cat:'Theatre'},hotel:{ico:'рЯП®',cls:'vy',cat:'Hotel'},fast_food:{ico:'рЯНФ',cls:'vo',cat:'Fast Food'},fuel:{ico:'вЫљ',cls:'vo',cat:'Gas Station'},supermarket:{ico:'рЯЫТ',cls:'',cat:'Supermarket'},convenience:{ico:'рЯП™',cls:'',cat:'Store'},park:{ico:'рЯМ≥',cls:'',cat:'Park'},fitness_centre:{ico:'рЯТ™',cls:'',cat:'Gym'},museum:{ico:'рЯПЫпЄП',cls:'vy',cat:'Museum'},attraction:{ico:'в≠Р',cls:'vy',cat:'Attraction'},viewpoint:{ico:'рЯСБпЄП',cls:'vy',cat:'Viewpoint'},artwork:{ico:'рЯО®',cls:'',cat:'Art'},gallery:{ico:'рЯЦЉпЄП',cls:'vy',cat:'Gallery'},monument:{ico:'рЯЧњ',cls:'vy',cat:'Monument'},memorial:{ico:'рЯХКпЄП',cls:'vy',cat:'Memorial'},castle:{ico:'рЯП∞',cls:'vy',cat:'Castle'},ruins:{ico:'рЯПЪпЄП',cls:'vy',cat:'Ruins'},bookshop:{ico:'рЯУЦ',cls:'vy',cat:'Bookshop'},bakery:{ico:'рЯ•Р',cls:'',cat:'Bakery'},electronics:{ico:'рЯУ±',cls:'',cat:'Electronics'},clothes:{ico:'рЯСХ',cls:'',cat:'Clothes'}};return M[t]||{ico:'рЯУН',cls:'',cat:(t||'place').replace(/_/g,' ')}}

function hav(a,b,c,d){const R=6371000,r=Math.PI/180,dL=(c-a)*r,dO=(d-b)*r,x=Math.sin(dL/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dO/2)**2;return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)))}
function brg(a,b,c,d){const r=Math.PI/180,dO=(d-b)*r,y=Math.sin(dO)*Math.cos(c*r),x=Math.cos(a*r)*Math.sin(c*r)-Math.sin(a*r)*Math.cos(c*r)*Math.cos(dO);return(Math.atan2(y,x)/r+360)%360}
function bdiff(a,b){return((a-b)+540)%360-180}
const degC=d=>['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];

async function fetchLocationName(lat,lon){
  try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,{headers:{'User-Agent':'AURA-AR/2.0'}});const d=await r.json();const a=d.address||{};const road=a.road||a.pedestrian||a.neighbourhood||'';const city=a.city||a.town||a.village||'';document.getElementById('np-name').textContent=(road||city||'Live AR').toUpperCase();document.getElementById('np-sub').innerHTML=`<span class="lpip"></span>${(city||'AR LAYER').toUpperCase()}`}catch(e){}
}

function buildCompass(){const s=document.getElementById('cs');s.innerHTML='';for(let i=0;i<720;i+=5){const el=document.createElement('span');el.className='ct';const m=i%360;if(m%90===0){el.classList.add('mj');el.textContent=['N','E','S','W'][m/90]}else if(m%45===0){el.classList.add('mj');el.textContent=['NE','SE','SW','NW'][(m/45-1)/2|0]}else if(m%30===0){el.textContent=m+'¬∞'}else{el.textContent='¬Ј'}s.appendChild(el)}}

function updateCompass(){const s=document.getElementById('cs'),w=document.getElementById('cw');s.style.transform=`translateX(${-(smoothH%360)*s.scrollWidth/720+w.offsetWidth/2}px)`;const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];document.getElementById('v-hdg').textContent=dirs[Math.round(smoothH/22.5)%16]+' '+Math.round(smoothH).toString().padStart(3,'0')+'¬∞'}

function buildAnchors(){
  const layer=document.getElementById('anc-layer');layer.innerHTML='';
  if(weatherData.tempFStr)mkAnc(layer,{id:'weather',bearing:5,elev:18,cls:'vy',w:'170px',stem:85,sh:'-1s',ico:weatherData.icon,cat:'Live Weather',val:weatherData.tempFStr,sub:weatherData.desc+' ¬Ј feels '+weatherData.feelsF+'¬∞F',dist:'вАФ',detail:{ico:weatherData.icon,type:'Weather ¬Ј Open-Meteo',title:'Live Conditions',stats:[{v:weatherData.tempFStr,l:'Temp'},{v:weatherData.humidity+'%',l:'Humidity'},{v:weatherData.wind+' mph',l:'Wind '+weatherData.windDir}],desc:weatherData.desc+'. Feels '+weatherData.feelsF+'¬∞F. Visibility '+weatherData.vis+'.'}});
  places.forEach((p,i)=>{const ds=p.dist>=1000?(p.dist/1000).toFixed(1)+'km':p.dist+'m';mkAnc(layer,{id:p.id,bearing:p.bearing,elev:p.elev,cls:p.cls,w:'155px',stem:50+Math.random()*45,sh:-(i*1.4)+'s',ico:p.ico,cat:p.cat,val:p.name.length>14?p.name.slice(0,13)+'вА¶':p.name,sub:p.cat+' ¬Ј '+ds,dist:ds,detail:{ico:p.ico,type:p.cat+' ¬Ј OpenStreetMap',title:p.name,stats:[{v:ds,l:'Distance'},{v:Math.round(p.bearing)+'¬∞',l:'Bearing'},{v:p.type.replace('_',' '),l:'Type'}],desc:mkDesc(p)}})});
}

function mkAnc(layer,a){const el=document.createElement('div');el.className=`anc ${a.cls}`;el.id='an-'+a.id;el.style.setProperty('--w',a.w);el.style.setProperty('--sh',a.sh);el.dataset.bearing=a.bearing;el.dataset.elev=a.elev;el._detail=a.detail;el.innerHTML=`<div class="acard"><div class="acbr"></div><div class="adist">${a.dist}</div><div class="atype"><div class="atd"></div>${a.cat}</div><div class="atitle">${a.ico} ${a.val}</div><div class="asub">${a.sub}</div></div><div class="astem" style="height:${a.stem}px"></div><div class="adot"></div>`;el.addEventListener('click',()=>openPopup(a.id));el.addEventListener('touchend',e=>{e.preventDefault();openPopup(a.id)},{passive:false});layer.appendChild(el)}

function mkDesc(p){const t=p.tags||{},pts=[];if(t.opening_hours)pts.push('Hours: '+t.opening_hours);if(t.phone)pts.push('рЯУЮ '+t.phone);if(t.cuisine)pts.push('Cuisine: '+t.cuisine);if(t['addr:street'])pts.push('рЯУН '+t['addr:street']);if(!pts.length)pts.push(p.cat+' located '+p.dist+'m '+degC(p.bearing)+' of your position. Source: OpenStreetMap.');return pts.join(' ¬Ј ')}

function updateAnchors(){const w=window.innerWidth,h=window.innerHeight,hw=FOV_H/2,hv=FOV_V/2;let vis=0;document.querySelectorAll('.anc').forEach(el=>{const b=parseFloat(el.dataset.bearing)||0,e=parseFloat(el.dataset.elev)||0,dh=bdiff(b,smoothH),dv=e-smoothP;if(Math.abs(dh)<hw+10&&Math.abs(dv)<hv+14){el.style.left=(w/2+(dh/hw)*(w/2))+'px';el.style.top=(h/2-(dv/hv)*(h/2)+20)+'px';const edge=Math.max(Math.abs(dh)/hw,Math.abs(dv)/hv);const alpha=Math.pow(Math.max(0,1-edge),1.3);el.style.opacity=alpha.toFixed(3);el.classList.toggle('vis',alpha>0.04);vis++}else{el.style.opacity='0';el.classList.remove('vis')}});document.getElementById('v-anc').textContent=vis}

function drawRadar(){const rc=document.getElementById('radar'),ctx=rc.getContext('2d'),cx=39,cy=39,R=35;ctx.clearRect(0,0,78,78);[12,24].forEach(r=>{ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(0,255,209,0.07)';ctx.lineWidth=1;ctx.stroke()});ctx.strokeStyle='rgba(0,255,209,0.07)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx-R,cy);ctx.lineTo(cx+R,cy);ctx.stroke();ctx.beginPath();ctx.moveTo(cx,cy-R);ctx.lineTo(cx,cy+R);ctx.stroke();const wa=(smoothH-90)*Math.PI/180,hf=(FOV_H/2)*Math.PI/180;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R-2,wa-hf,wa+hf);ctx.closePath();ctx.fillStyle='rgba(0,255,209,0.07)';ctx.fill();ctx.strokeStyle='rgba(0,255,209,0.17)';ctx.lineWidth=1;ctx.stroke();document.querySelectorAll('.anc').forEach(el=>{const b=parseFloat(el.dataset.bearing)||0,rel=(b-smoothH+360)%360,rad=(rel-90)*Math.PI/180,bx=cx+Math.cos(rad)*25,by=cy+Math.sin(rad)*25,al=0.3+Math.max(0,1-Math.abs(bdiff(b,smoothH))/90)*0.7,cl=el.className;ctx.beginPath();ctx.arc(bx,by,2.5,0,Math.PI*2);ctx.fillStyle=cl.includes('vr')?`rgba(255,64,64,${al})`:cl.includes('vo')?`rgba(255,144,48,${al})`:cl.includes('vy')?`rgba(255,215,0,${al})`:`rgba(0,255,209,${al})`;ctx.fill()});ctx.beginPath();ctx.arc(cx,cy,3.5,0,Math.PI*2);ctx.fillStyle='#00FFD1';ctx.shadowColor='#00FFD1';ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0}

function openPopup(id){const el=document.getElementById('an-'+id);if(!el||!el._detail)return;const d=el._detail;document.getElementById('p-ico').textContent=d.ico;document.getElementById('p-type').textContent=d.type;document.getElementById('p-title').textContent=d.title;document.getElementById('p-body').innerHTML=`<div class="psg">${d.stats.map(s=>`<div class="pst"><div class="psv">${s.v}</div><div class="psl">${s.l}</div></div>`).join('')}</div><div class="pdesc">${d.desc}</div><div class="pacts"><button class="pact pa" onclick="closePopup()">вђ° Tag Here</button><button class="pact ps2" onclick="closePopup()">Dismiss</button></div>`;document.getElementById('popup').classList.add('on');doFlash();playTone(440,0.08,0.15)}
function closePopup(){document.getElementById('popup').classList.remove('on')}
function doFlash(){const f=document.getElementById('flash');f.classList.add('on');setTimeout(()=>f.classList.remove('on'),180)}
let toastT;function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),3200)}

function initAudio(){if(audioCtx)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function playTone(f=440,g=0.06,d=0.1){if(!audioCtx)return;try{const o=audioCtx.createOscillator(),gn=audioCtx.createGain();o.type='sine';o.frequency.value=f;gn.gain.setValueAtTime(g,audioCtx.currentTime);gn.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(gn);gn.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}catch(e){}}

function initSensors(){
  const h=e=>{hasSensor=true;heading=e.webkitCompassHeading!==undefined?e.webkitCompassHeading:(360-(e.alpha||0)+360)%360;pitch=Math.max(-28,Math.min(28,(e.beta||0)-45))};
  if(typeof DeviceOrientationEvent!=='undefined'){
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      const btn=document.createElement('button');btn.textContent='ENABLE MOTION';btn.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;padding:13px 30px;background:rgba(0,255,209,0.08);border:1px solid rgba(0,255,209,0.3);border-radius:9px;font-family:Orbitron,monospace;font-size:10px;letter-spacing:.16em;color:#00FFD1;cursor:pointer;display:none';btn.id='motionbtn';document.body.appendChild(btn);
      btn.onclick=()=>{initAudio();DeviceOrientationEvent.requestPermission().then(s=>{if(s==='granted')window.addEventListener('deviceorientation',h,true);btn.remove();showToast('вЬУ Motion active')})};
      setTimeout(()=>{btn.style.display='block'},2500);
    }else{window.addEventListener('deviceorientationabsolute',h,true);window.addEventListener('deviceorientation',h,true)}
  }
  document.addEventListener('click',()=>{if(!audioCtx)initAudio()},{once:true});
}

function initDrag(){
  const dn=(x,y)=>{dragActive=true;lastX=x;lastY=y;document.body.classList.add('dragging')};
  const mv=(x,y)=>{if(!dragActive)return;heading=(heading-(x-lastX)*0.35+360)%360;pitch=Math.max(-26,Math.min(26,pitch+(y-lastY)*0.18));lastX=x;lastY=y};
  const up=()=>{dragActive=false;document.body.classList.remove('dragging')};
  document.addEventListener('mousedown',e=>{if(!e.target.closest('#popup,.pact,#motionbtn'))dn(e.clientX,e.clientY)});
  document.addEventListener('mousemove',e=>mv(e.clientX,e.clientY));
  document.addEventListener('mouseup',up);
  document.addEventListener('touchstart',e=>{if(!e.target.closest('#popup,.pact,.anc,#motionbtn'))dn(e.touches[0].clientX,e.touches[0].clientY)},{passive:true});
  document.addEventListener('touchmove',e=>{if(dragActive)mv(e.touches[0].clientX,e.touches[0].clientY)},{passive:true});
  document.addEventListener('touchend',up);
}

function startLoop(){
  (function loop(){
    requestAnimationFrame(loop);frame++;
    const dh=((heading-smoothH)+540)%360-180;
    smoothH=(smoothH+dh*(hasSensor?0.14:SMOOTH)+360)%360;
    if(!dragActive&&!hasSensor)pitch*=0.94;
    smoothP+=(pitch-smoothP)*0.12;
    updateAnchors();
    if(frame%2===0){updateCompass();drawRadar()}
    if(frame%60===0){const n=new Date(),h=n.getHours(),m=n.getMinutes().toString().padStart(2,'0');document.getElementById('v-time').textContent=`${h>12?h-12:h||12}:${m}`;document.getElementById('v-pitch').textContent=(smoothP>=0?'+':'')+Math.round(smoothP)+'¬∞'}
  })();
}

boot();
</script>
</body>
</html>
